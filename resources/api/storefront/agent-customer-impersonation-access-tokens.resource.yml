resource:
    name: AgentCustomerImpersonationAccessTokens
    shortName: agent-customer-impersonation-access-tokens
    description: 'Creates customer impersonation access tokens for agents to act on behalf of a customer.'
    security: "is_granted('ROLE_AGENT')"
    securityCode: '4103'
    securityMessage: 'Action is available to agent user only.'

    processor: Spryker\Glue\AgentAuthRestApi\Api\Storefront\Processor\AgentCustomerImpersonationAccessTokensStorefrontProcessor
    paginationEnabled: false

    operations:
        - type: Post
          uriTemplate: '/agent-customer-impersonation-access-tokens'
          description: 'Issues an access token that lets an authenticated agent act on behalf of the specified customer.'
          normalizationContext:
              gen_id: false

    properties:
        customerReference:
            type: string
            writable: true
            readable: false
            required: false
            description: 'Unique reference of the customer to impersonate.'
            openapiContext:
                example: 'DE--1'

        accessToken:
            type: string
            writable: false
            readable: true
            description: 'JWT access token for authenticating as the impersonated customer.'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'

        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0.'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance.'
            openapiContext:
                example: 3600

        refreshToken:
            type: string
            writable: false
            readable: true
            description: 'Token used to obtain a new access token when the current one expires.'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'
