resource:
    name: AgentAccessTokens
    shortName: agent-access-tokens
    description: 'Creates agent access tokens using username and password credentials.'
    resourceAttributesClassName: 'Generated\Shared\Transfer\RestAgentAccessTokensRequestAttributesTransfer'

    processor: Spryker\Glue\AgentAuthRestApi\Api\Storefront\Processor\AgentAccessTokensStorefrontProcessor
    paginationEnabled: false

    operations:
        - type: Post
          uriTemplate: '/agent-access-tokens'
          description: 'Issues an agent access token using agent credentials (email + password).'
          normalizationContext:
              gen_id: false

    properties:
        username:
            type: string
            writable: true
            readable: false
            required: false
            description: 'Agent email address.'
            openapiContext:
                example: 'admin@spryker.com'

        password:
            type: string
            writable: true
            readable: false
            required: false
            description: 'Agent password.'
            openapiContext:
                example: 'change123'

        accessToken:
            type: string
            writable: false
            readable: true
            description: 'JWT access token for authenticating subsequent agent API requests.'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'

        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0.'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance.'
            openapiContext:
                example: 3600

        refreshToken:
            type: string
            writable: false
            readable: true
            description: 'Token used to obtain a new access token when the current one expires.'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'
